name: ci-cd-backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.13
          cache: "pip"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      # - run: pytest

  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set metadata
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            tomaslocatelli/registro-star-wars-revolta-dos-clones-devops:latest
            tomaslocatelli/registro-star-wars-revolta-dos-clones-devops:${{ steps.meta.outputs.image_tag }}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO}}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Build and push image
        uses: docker/docker-push-action@v6 
        with:
          context: ./backend          
          file: ./backend/Dockerfile  
          push: true
          tags: |
            tomaslocatelli/registro-star-wars-revolta-dos-clones-devops:latest
            tomaslocatelli/registro-star-wars-revolta-dos-clones-devops:${{ steps.meta.outputs.image_tag }}

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add .
          git commit -m "CHORE: update backend image"
          git push
